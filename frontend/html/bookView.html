<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cards.css">
    <title>Biblioteca - Lib.go</title>
</head>

<body>
    <header>
        <div class="brand-content">
            <a href="./index.html">
                <div class="logo-container">
                    <img src="../img/lib-logo.png" alt="Logo da biblioteca Lib Go">
                </div>
            </a>
            <h1>Lib.Go</h1>
        </div>

        <div class="search-bar-container">
            <input type="text" placeholder="Buscar...">
        </div>
    </header>

    <main class="container">

        <section class="cards-section">
            <div class="cards">
                <div class="book-cover-img-container">
                    <img src="../img/suicidas-cover.png" alt="Capa do livro">
                </div>

                <div class="book-info">
                    <h3>Suicídas</h3>

                    <span>30/05/2026</span>
                    <span>12 Dias até o prazo final</span>
                </div>

                <div class="book-status">
                    <h3>Emprestado</h3>
                </div>
            </div>

            <div class="cards">
                <div class="book-cover-img-container">
                    <img src="../img/heatedRivalry-cover.png" alt="Capa do livro">
                </div>

                <div class="book-info">
                    <h3>Heated Rivalry</h3>

                    <span>10/05/2026</span>
                    <span>15 Dias de atraso</span>
                </div>
                <div class="book-status">
                    <h3>Atrasado</h3>
                </div>
            </div>

            <div class="cards">
                <div class="book-cover-img-container">
                    <img src="../img/ladyKillers-cover.png" alt="Capa do livro">
                </div>

                <div class="book-info">
                    <h3>Lady Killers</h3>

                    <span>10/02/2026</span>
                    <span>+2 meses de atraso</span>
                </div>
                <div class="book-status">
                    <h3>Atrasado</h3>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
