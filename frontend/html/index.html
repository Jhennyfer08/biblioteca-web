<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/index.css">
    <title>Biblioteca - Lib.go</title>
</head>

<body>
    <header>
        <div class="brand-content">
            <div class="logo-container">
                <img src="../img/lib-logo.png" alt="Logo da biblioteca Lib Go">
            </div>
            <h1>Lib.Go</h1>
        </div>

        <div class="search-bar-container">
            <input type="text" placeholder="Buscar...">
        </div>
    </header>

    <main class="container">

        <section class="cards-section">
            <div class="cards" id="lendBooks">
                <a href="./bookLend.html">
                    <div class="cards-image-container">
                        <img src="../img/lend.png" alt="Imagem ilustrativa do card de empréstimo de livros">
                    </div>
                    <h2>Pegar emprestado</h2>
                </a>
            </div>

            <div class="cards" id="returnBooks">
                <a href="./bookReturn.html">
                    <div class="cards-image-container">
                        <img src="../img/return.png" alt="Imagem ilustrativa do card de retorno de livros">
                    </div>
                    <h2>Devolver</h2>
                </a>
            </div>

            <div class="cards" id="viewBooks">
                <a href="./bookView.html">
                    <div class="cards-image-container">
                        <img src="../img/view.png" alt="Imagem ilustrativa do card de visualização de livros">
                    </div>
                    <h2>Histórico de livros</h2>
                </a>
            </div>

            <div class="cards" id="viewBooks">
                <a href="./bookRegister.html">
                    <div class="cards-image-container">
                        <img src="../img/view.png" alt="Imagem ilustrativa do card de visualização de livros">
                    </div>
                    <h2>Cadastro de Livros</h2>
                </a>
            </div>
        </section>

    </main>

    <footer>
        <p>"Compartilhar não é imoral, é um imperativo moral."— Aaron Swartz</p>
        <p>&copy; copyrights reserveds to Lib.Go</p>
    </footer>
</body>

</html>
